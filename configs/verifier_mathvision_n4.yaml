data:
  train_path: outputs/verifier/mathvision_n4_train.jsonl
  valid_path: outputs/verifier/mathvision_n4_valid.jsonl

model:
  base_model: distilbert-base-uncased
  output_dir: outputs/verifier/mathvision_n4_checkpoints

training:
  max_length: 512
  batch_size: 8
  learning_rate: 2.0e-5
  epochs: 3
  seed: 42
  logging_steps: 20
  save_total_limit: 2
  fp16: false
